<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genetic Disorders Quiz - by al_witify</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a0024, #05000a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        /* Royal Background Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Header & Signature */
        .header {
            text-align: center;
            padding: 50px 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .title {
            font-size: 2.2rem;
            color: #f0f0f0;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .signature {
            font-size: 4rem;
            color: #ffd700;
            font-family: 'Georgia', serif;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ffaa00, 0 0 40px #ff8800, 0 0 80px #ff4400;
            animation: glow 2.5s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffaa00, 0 0 30px #ff8800; }
            to { text-shadow: 0 0 20px #ffd700, 0 0 40px #ffaa00, 0 0 60px #ff8800; transform: scale(1.02); }
        }

        /* Score Tracker */
        .score-board {
            position: sticky;
            top: 0;
            background: rgba(10, 0, 17, 0.85);
            padding: 15px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            z-index: 100;
            border-bottom: 2px solid #ffd700;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }

        /* Quiz Container */
        .quiz-container {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.3s, border-color 0.3s;
        }

        .question-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.15);
        }

        .question-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #ffffff;
            font-weight: 500;
        }

        /* Options */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            padding: 18px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.15rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            padding-left: 35px;
        }

        .correct {
            background: rgba(0, 180, 0, 0.25) !important;
            border-color: #0f0 !important;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            color: #fff;
        }

        .wrong {
            background: rgba(220, 0, 0, 0.25) !important;
            border-color: #f00 !important;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            color: #fff;
        }

        .disabled {
            pointer-events: none;
        }

        /* Floating Emojis Animation */
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -200px) scale(1.8); opacity: 0; }
        }

        .emoji-anim {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: floatUp 1.2s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="header">
        <div class="title">down syndrome MCQ</div>
        <div class="signature">by : al_witify</div>
    </div>

    <div class="score-board" id="scoreBoard">
        Score: 0 / 25
    </div>

    <div class="quiz-container" id="quizContainer">
        </div>

    <script>
        // Audio Context for sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.6);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // Emoji System
        function spawnEmojis(isCorrect, x, y) {
            const correctEmojis = ['🎉', '👑', '✨', '🌟', '👏', '🤩', '🔥', '💯', '🏆', '🥇'];
            const wrongEmojis = ['❌', '😢', '💔', '😿', '🛑', '📉', '🤦', '💀', '⚠️', '👎'];
            const arr = isCorrect ? correctEmojis : wrongEmojis;
            
            for(let i=0; i<7; i++) {
                const el = document.createElement('div');
                el.className = 'emoji-anim';
                el.innerText = arr[Math.floor(Math.random() * arr.length)];
                
                // Spread emojis around the click point
                const offsetX = (Math.random() - 0.5) * 200;
                const offsetY = (Math.random() - 0.5) * 100;
                
                el.style.left = (x + offsetX) + 'px';
                el.style.top = (y + offsetY) + 'px';
                
                document.body.appendChild(el);
                
                setTimeout(() => el.remove(), 1200);
            }
        }

        // Questions Data (20 Past Exams + 5 New Lecture specific)
        const questions = [
            // --- 20 Past Exam Questions ---
            { q: "1. A 42-year-old woman gives birth to a neonate with multiple congenital abnormalities. Physical findings included a flat facial profile, epicanthal folds, and protruding tongue. What is the most common cause of this developmental birth disease?", options: ["A. Chromosomal translocation", "B. Expansion of trinucleotide repeat", "C. Nondisjunction", "D. Frameshift point mutation"], ans: 2 },
            { q: "2. A 30-year-old female with Down syndrome. Which of the following is a life-threatening disorder known to be associated with her chromosomal abnormality?", options: ["A. Premature Alzheimer disease", "B. Acute leukemia", "C. Severe mental retardation", "D. Chronic myeloid leukemia"], ans: 1 },
            { q: "3. 10 y old girl with Down syndrome Karyotyping, which is WRONG:", options: ["A. 47,XX,+21", "B. 46, XX, t (14;21), +21", "C. 47XXX, ring 21", "D. 46,XX/47XX, +21"], ans: 2 },
            { q: "4. A girl of 4 years old was reported with typical features of Down syndrome. Cytogenetic studies revealed the number of chromosome 46,XX. What is the possibility of karyotyping?", options: ["A. 46,XX, t(14q;21q), +21", "B. 46,XX/47XX,+21", "C. 47,XX,+21", "D. 46,XX,t(14p;21p),+21"], ans: 0 },
            { q: "5. Regarding Down syndrome: all statements are false EXCEPT:", options: ["A. Eunuchoid appearance", "B. Hypogonadism", "C. Streak ovaries", "D. Epicanthal fold"], ans: 3 },
            { q: "6. Mental retardation in child is main characteristics of which syndrome?", options: ["A. Down syndrome", "B. Klinefelter syndrome", "C. Turner syndrome", "D. Cri-du-chat syndrome"], ans: 0 },
            { q: "7. 46 chromosomes were revealed on karyotype examination of a 5-year-old girl. One of the 14th pair of chromosomes is longer than usual due to a connected chromosome from the 21 pair. What type of mutation does this girl have?", options: ["A. Deletion", "B. Translocation", "C. Inversion", "D. Duplication"], ans: 1 },
            { q: "8. In a Robertsonian translocation fusion occurs at the:", options: ["A. Both ends of the long arms", "B. Both ends of the short arms", "C. Both ends of the long arms Y and 12", "D. Both ends of chromosome 1 and 2"], ans: 0 },
            { q: "9. The type of chromosome disorder in which long arms of the two acrocentric chromosomes fuse together to form one chromosome is:", options: ["A. Deletion", "B. Duplication", "C. Reciprocal translocation", "D. Robertsonian translocation"], ans: 3 },
            { q: "10. A first day-old boy is diagnosed with Edwards syndrome. What chromosomal changes can cause this disease?", options: ["A. Trisomy 21", "B. Trisomy 18", "C. Trisomy 13", "D. Monosomy X"], ans: 1 },
            { q: "11. The karyotyping (47,XX,+18) indicates:", options: ["A. Down's syndrome", "B. Turner's syndrome", "C. Edward's syndrome", "D. Patau's syndrome"], ans: 2 },
            { q: "12. Patau's syndrome is caused due to which of the following?", options: ["A. Trisomy of 13th chromosome", "B. Tetrasomy of 13th chromosome", "C. Trisomy of 18th chromosome", "D. Trisomy of 21st chromosome"], ans: 0 },
            { q: "13. A male infant dies 1 day after birth. Gross examination reveals sever abnormal polydactyly, a cleft lip and palate. Which of the listed chromosomal abnormalities is consistent with these findings?", options: ["A. Karyotyping (46, XY, 11p -)", "B. Trisomy 21", "C. Trisomy 13 or Trisomy 18", "D. Karyotyping (46,XX or XY, 13q-)"], ans: 2 },
            { q: "14. Non-disjunction refers to:", options: ["A. Failure of separation of sister chromatids during the 2nd meiotic division only", "B. Failure of separation of homologous pair of chromosomes at the 1st meiotic division", "C. Exchange of segments between non-homologous chromosomes", "D. Deletion of chromosome segments"], ans: 1 },
            { q: "15. The presence of two or more cell lines from zygotes in a single individual is known as:", options: ["A. Aneuploidy", "B. Diploidy", "C. Mosaicism", "D. Triploidy"], ans: 2 },
            { q: "16. Cytogenetic examination of a patient revealed normal karyotype 46 XY in some cells, but most cells have karyotype of 47 XXY. Such cell heterogeneity is called:", options: ["A. Inversion", "B. Mosaicism", "C. Transposition", "D. Monomorphism"], ans: 1 },
            { q: "17. Mosaicism, all the following are true EXCEPT:", options: ["A. Mitotic error", "B. Occurs after fertilization", "C. The same individual contains more than one cell population", "D. Mosaicism affecting autosomal chromosome is the most common"], ans: 3 },
            { q: "18. Mosaicism all true EXCEPT:", options: ["A. Post-zygotic mitotic non-disjunction", "B. Autosomes is less common", "C. Person does have all the physical features", "D. Some with normal chromosomal complement others with a trisomic"], ans: 2 },
            { q: "19. 10 y old girl with Down syndrome Karyotyping, All true EXCEPT:", options: ["A. 46, XX, t(14;21), +21", "B. 46, XX/47XX,+21", "C. Ring X chr. (46X r)", "D. 47,XX,+21"], ans: 2 },
            { q: "20. The karyotyping (47,XY,+13) indicates:", options: ["A. Down's syndrome", "B. Edward's syndrome", "C. Patau's syndrome", "D. Klinefelter syndrome"], ans: 2 },

            // --- 5 New Questions (Lecture Specific) ---
            { q: "21. The gene for Amyloid Precursor Protein (APP) resides on which chromosome, explaining the premature Alzheimer disease in Down syndrome patients?", options: ["A. Chromosome 13", "B. Chromosome 14", "C. Chromosome 18", "D. Chromosome 21"], ans: 3 },
            { q: "22. In the pathogenesis of Alzheimer's disease associated with Down syndrome, the metabolism of APP is altered by which of the following enzymes to form toxic Beta-amyloid (Aβ)?", options: ["A. Alpha-secretase only", "B. Beta and Gamma-secretase", "C. Lysosomal hydrolases", "D. DNA polymerase"], ans: 1 },
            { q: "23. During the second trimester of pregnancy, the 'triple screen' for Down syndrome typically shows which of the following patterns in maternal serum?", options: ["A. Low AFP, Low unconjugated estriol, High hCG", "B. High AFP, High estriol, Low hCG", "C. High AFP, Low estriol, Normal hCG", "D. Normal levels of all three markers"], ans: 0 },
            { q: "24. Ultrasound measurements of fetal nuchal translucency in a fetus with Down syndrome are typically:", options: ["A. Decreased", "B. Normal", "C. Increased", "D. Absent"], ans: 2 },
            { q: "25. The strong correlation with maternal age (more than 45y) suggests that in most cases the meiotic nondisjunction of chromosome 21 in Down syndrome occurs in the:", options: ["A. Sperm", "B. Ovum", "C. Zygote after fertilization", "D. Placental cells"], ans: 1 }
        ];

        let currentScore = 0;
        const scoreBoard = document.getElementById('scoreBoard');
        const quizContainer = document.getElementById('quizContainer');

        // Render Questions
        questions.forEach((item, qIndex) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'question-text';
            qTitle.innerText = item.q;
            card.appendChild(qTitle);

            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';

            item.options.forEach((optText, optIndex) => {
                const optBtn = document.createElement('div');
                optBtn.className = 'option';
                optBtn.innerText = optText;
                
                optBtn.onclick = (e) => {
                    if(optionsContainer.classList.contains('disabled')) return;
                    optionsContainer.classList.add('disabled');
                    
                    const isCorrect = (optIndex === item.ans);
                    
                    if (isCorrect) {
                        optBtn.classList.add('correct');
                        currentScore++;
                        scoreBoard.innerText = `Score: ${currentScore} / 25`;
                        playSound('correct');
                        spawnEmojis(true, e.clientX, e.clientY);
                    } else {
                        optBtn.classList.add('wrong');
                        optionsContainer.children[item.ans].classList.add('correct');
                        playSound('wrong');
                        spawnEmojis(false, e.clientX, e.clientY);
                    }
                };
                
                optionsContainer.appendChild(optBtn);
            });

            card.appendChild(optionsContainer);
            quizContainer.appendChild(card);
        });

        /* --- Royal Canvas Particles Background --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = (Math.random() - 0.5) * 0.6;
                this.color = `rgba(255, 215, 0, ${Math.random() * 0.8 + 0.2})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 8000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 215, 0, ${0.4 - distance/300})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        initParticles();
        animateParticles();

    </script>
</body>
</html>
