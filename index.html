<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار تشريح العضلات - MCQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .medical-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-button {
            background-color: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #555;
        }
        .option-button:hover {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }
        .option-button.correct {
            background-color: #28a745;
            color: white;
            border-color: #28a745;
        }
        .option-button.incorrect {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
        }
        #result-message {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <img src="head5.jpg" alt="تشريح عضلات الرأس" class="medical-image">

    <p class="question-text">ما هي العضلة المشار إليها بالرقم (4)؟</p>

    <div class="options-container">
        <button class="option-button" onclick="checkAnswer(this, 'العضلة المبوقة (Buccinator)')">العضلة المبوقة (Buccinator)</button>
        <button class="option-button" onclick="checkAnswer(this, 'العضلة الصدغية (Temporalis)')">العضلة الصدغية (Temporalis)</button>
        <button class="option-button" onclick="checkAnswer(this, 'العضلة المضغية (Masseter)')">العضلة المضغية (Masseter)</button>
        <button class="option-button" onclick="checkAnswer(this, 'العضلة الوجنية الكبيرة (Zygomaticus Major)')">العضلة الوجنية الكبيرة (Zygomaticus Major)</button>
    </div>

    <p id="result-message"></p>
</div>

<script>
    const correctAnswer = "العضلة الصدغية (Temporalis)";

    function checkAnswer(selectedButton, answerText) {
        // منع الضغط المتكرر
        const buttons = document.querySelectorAll('.option-button');
        buttons.forEach(btn => btn.disabled = true);

        const resultMessage = document.getElementById('result-message');

        if (answerText === correctAnswer) {
            selectedButton.classList.add('correct');
            resultMessage.textContent = "✅ إجابة صحيحة! أحسنت.";
            resultMessage.style.color = "#28a745";
        } else {
            selectedButton.classList.add('incorrect');
            resultMessage.textContent = "❌ إجابة خاطئة. الإجابة الصحيحة هي: " + correctAnswer;
            resultMessage.style.color = "#dc3545";
            
            // تمييز الإجابة الصحيحة
            buttons.forEach(btn => {
                if (btn.textContent === correctAnswer) {
                    btn.classList.add('correct');
                }
            });
        }
    }
</script>

</body>
</html>
